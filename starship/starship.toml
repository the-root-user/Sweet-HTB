clang = "#00599D"
cpp = "#00599D"
golang = "#00ADD8"
ruby = "#CC342D"
php = "#777BB4"
lua = "#000080"
perl = "#394E79"
elixir = "#6E4A7E"
haskell = "#5E5086"
swift = "#F05138"
kotlin = "#B125A6"
duration = "#F4FBFF"
