format = """\
[в•ӯв•ҙ](fg:arrow)\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $conda\
    $nodejs\
    $cpp\
    $golang\
    $ruby\
    $php\
    $lua\
    $perl\
    $elixir\
    $haskell\
    $swift\
    $kotlin\
)\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""
# Add the modules you need

# Disables the blank line at the start of the prompt
add_newline = true

# Palettes:
#   old: the previous version.
#   normal: dark gray / yellow / white palette.
#   light: pastel light colors.
# To change the colors: change to the corresponding palette.
palette = "htb"

[palettes.old]
arrow = "#353535"
os = "#3778BF"
os_admin = "#6A040F"
directory = "#3F37C9"
node = "green"
time = "#177E89"
git = "#B02B10"
git_status = "#8B1D2C"
python = "#3776AB"
conda = "#3EB049"
java = "#861215"
rust = "#C33C00"
clang = "#00599D"
cpp = "#00599D"
golang = "#00ADD8"
ruby = "#CC342D"
php = "#777BB4"
lua = "#000080"
perl = "#394E79"
elixir = "#6E4A7E"
haskell = "#5E5086"
swift = "#F05138"
kotlin = "#B125A6"
duration = "yellow"
text_color = "#EDF2F4"
text_light = "#EDF2F4"

[palettes.htb]
arrow = "#9FEF00"           # HTB signature neon green
os = "#141d2b"              # Dark blue-black
os_admin = "#9FEF00"        # Neon green for admin/root
directory = "#1a2332"       # Slightly lighter dark blue
time = "#2d3748"            # Dark gray-blue
node = "#9FEF00"            # HTB green
git = "#1f2937"             # Dark charcoal
git_status = "#374151"      # Medium dark gray
python = "#70df01"          # HTB green
conda = "#70df01"           # Light mint green
java = "#70df01"            # HTB green
rust = "#70df01"            # Orange accent
clang = "#70df01"           # Blue accent
cpp = "#70df01"             # Blue accent (matches clang)
golang = "#70df01"          # Cyan for Go
ruby = "#70df01"            # Red accent
php = "#70df01"            # Purple accent
lua = "#70df01"             # Blue accent
perl = "#70df01"            # Purple accent
elixir = "#70df01"          # Purple accent
haskell = "#70df01"         # Gray accent
swift = "#70df01"           # Red accent
kotlin = "#70df01"          # Purple accent
duration = "#10b981"        # Emerald green
text_color = "#9FEF00"      # HTB neon green text
text_light = "#e5e7eb"      # Light gray text
text_dark = "#111827"

[palettes.normal]
arrow = "#353535"
os = "#2C3032"
os_admin = "#6A040F"
directory = "#363C3E"
time = "#474D5C"
